  <text x="160" y="132" fill="#252237" font-family="Manrope, Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700">Story Puzzle</text>
  <text x="160" y="200" fill="#252237" font-family="Manrope, Arial, 'PingFang SC', sans-serif" font-size="72" font-weight="800">UI 规范与使用流程</text>
  <text x="160" y="265" fill="#4E596F" font-family="Arial, 'PingFang SC', sans-serif" font-size="30">面向低压力轻社交场景：语音讲述、同伴补充、AI 生图、协作拼图。</text>
  <text x="160" y="320" fill="#4E596F" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">核心目标：让表达被听见，让互动变轻，让共同完成变可见。</text>

