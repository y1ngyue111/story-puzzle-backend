  <text x="1498" y="270" text-anchor="middle" fill="#252237" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700">协作完成</text>

  <text x="160" y="535" fill="#252237" font-family="Manrope, Arial, 'PingFang SC', sans-serif" font-size="42" font-weight="800">1. 用户旅程</text>
  <text x="160" y="580" fill="#66607A" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">从轻微紧张到共同完成，流程保持简短、可见、可参与。</text>

